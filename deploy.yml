name: Deploy

on:
    push:
        branches: [ master ]

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Adding private SSH key to ssh-agent
              env:
                  SSH_AUTH_SOCK: /tmp/ssh_agent.sock
              run: |
                  mkdir -p ~/.ssh
                  ssh-agent -a $SSH_AUTH_SOCK > /dev/null
                  ssh-keyscan github.com >> ~/.ssh/known_hosts
                  ssh-add - <<< "${{ secrets.SSH_PRIVATE_KEY }}"

            - name: Transfer files to remote
              env:
                  SSH_AUTH_SOCK: /tmp/ssh_agent.sock
              run: |
                  scp -o StrictHostKeyChecking=no -r ./* ${{ secrets.PRODUCTION_USERNAME }}@${{ secrets.PRODUCTION_SERVER }}:/var/www/thelibrarycollegeville.com/html
